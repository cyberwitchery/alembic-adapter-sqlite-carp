name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # the sqlite3 carp library links -lsqlite3; linux runners need the headers.
      - name: Install sqlite (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      # setup-carp rewrites git@github.com: deps to https by default, so the
      # json and sqlite3 loads resolve without an ssh key on the runner.
      - name: Setup Carp
        uses: carpentry-org/setup-carp@v1

      - name: Build adapter
        run: carp -b alembic-sqlite.carp

      - name: Run unit tests
        run: carp -x test/adapter.carp

      # protocol-level e2e: drives the compiled binary over stdin/stdout.
      # rebuilds the binary itself (the unit-test run reuses the same out/ name).
      - name: Run e2e
        run: bash test/e2e.sh

  # real alembic-driven e2e: the actual cli spawns the adapter and converges an
  # inventory. needs the rust cli, so it is split out and runs linux-only; the
  # compiled cli is cached, so it is built once rather than every run.
  e2e-alembic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install sqlite
        run: sudo apt-get update && sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Install alembic cli
        uses: baptiste0928/cargo-install@v3
        with:
          crate: alembic-cli
          version: "0.5.0"

      - name: Setup Carp
        uses: carpentry-org/setup-carp@v1

      - name: Run alembic-driven e2e
        run: ALEMBIC="$(command -v alembic-cli)" bash test/e2e-alembic.sh
