name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # the sqlite3 carp library links -lsqlite3; linux runners need the headers.
      - name: Install sqlite (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      # setup-carp rewrites git@github.com: deps to https by default, so the
      # json and sqlite3 loads resolve without an ssh key on the runner.
      - name: Setup Carp
        uses: carpentry-org/setup-carp@v1

      - name: Build adapter
        run: carp -b alembic-sqlite.carp

      - name: Run unit tests
        run: carp -x test/adapter.carp

      # protocol-level e2e: drives the compiled binary over stdin/stdout.
      # rebuilds the binary itself (the unit-test run reuses the same out/ name).
      - name: Run e2e
        run: bash test/e2e.sh

  # build the alembic cli in its own job. release codegen of the workspace OOMs a
  # standard runner, so build the dev profile with no debuginfo and single-job
  # codegen (same approach as alembic-ops). the binary is cached on the alembic
  # version, so it only rebuilds on a bump, and is handed to e2e as an artifact.
  build-cli:
    name: build alembic-cli
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: "1"
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_DEV_INCREMENTAL: "false"
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - name: cache the alembic binary
        id: cache
        uses: actions/cache@v6
        with:
          path: cli/alembic
          key: alembic-${{ runner.os }}-0.7.0
      - name: build the alembic cli
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cargo install alembic-cli --version "=0.7.0" --debug --locked \
            --root "${RUNNER_TEMP}/cargo"
          mkdir -p cli
          cp "${RUNNER_TEMP}/cargo/bin/alembic" cli/alembic
          strip cli/alembic
      - uses: actions/upload-artifact@v7
        with:
          name: alembic-cli
          path: cli/alembic

  # real alembic-driven e2e: the actual cli spawns the adapter and converges an
  # inventory (plan/apply, idempotent re-plan, update, delete). linux-only.
  e2e-alembic:
    name: e2e (alembic)
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install sqlite
        run: sudo apt-get update && sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Download the alembic cli
        uses: actions/download-artifact@v8
        with:
          name: alembic-cli
          path: cli

      - name: Put the alembic cli on PATH
        run: |
          chmod +x cli/alembic
          mkdir -p "$HOME/.local/bin"
          mv cli/alembic "$HOME/.local/bin/alembic"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Setup Carp
        uses: carpentry-org/setup-carp@v1

      - name: Run alembic-driven e2e
        run: ALEMBIC=alembic bash test/e2e-alembic.sh
